aid: taylor-francis
name: Taylor & Francis
description: >-
  Taylor & Francis Group is a British academic publisher offering REST APIs for
  searching and accessing journal articles, books, metadata, and bibliographic
  records from over 2,700 Taylor & Francis and Routledge publications. Their API
  surfaces include content download APIs for books and chapters, KBART holdings
  automation for library systems, COUNTER 5 SUSHI usage reporting, and text and
  data mining access for institutional subscribers across humanities, social
  sciences, science, technology, and medicine.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Academic
  - Books
  - Journals
  - Metadata
  - Publishing
  - Research
  - Text Mining
created: '2026-06-13'
modified: '2026-06-13'
url: >-
  https://raw.githubusercontent.com/api-evangelist/taylor-francis/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: taylor-francis:taylor-francis-content-api
    name: Taylor & Francis Content API
    description: >-
      The Taylor & Francis Content API provides programmatic access to eBook and
      chapter downloads from the taylorfrancis.com platform. Using DOI-based
      identifiers, institutional subscribers can retrieve PDF content for
      monographs and edited volume chapters, including open-access titles, via
      the api.taylorfrancis.com domain.
    humanURL: https://www.taylorfrancis.com/
    baseURL: https://api.taylorfrancis.com
    tags:
      - Books
      - Chapters
      - Content
      - DOI
      - Downloads
      - eBooks
    properties:
      - type: Documentation
        url: https://www.taylorfrancis.com/how-to-obtain-institutional-token
      - type: Authentication
        url: https://librarianresources.taylorandfrancis.com/services-support/authentication-and-remote-access/
  - aid: taylor-francis:taylor-francis-kbart-holdings-api
    name: Taylor & Francis KBART Holdings API
    description: >-
      The Taylor & Francis KBART Holdings API enables library management systems
      to automatically retrieve and synchronise institutional journal and eBook
      entitlements. Librarians generate a Customer Reference Number (CRN) token
      from the Librarian Dashboard, which LMS providers use to pull KBART
      holdings files on an automated schedule.
    humanURL: https://librarianresources.taylorandfrancis.com/insights/library-management/enhanced-kbart-features/
    tags:
      - Automation
      - eBooks
      - Holdings
      - Institutional
      - KBART
      - Library
    properties:
      - type: Documentation
        url: https://librarianresources.taylorandfrancis.com/insights/library-management/enhanced-kbart-features/
      - type: GettingStarted
        url: https://www.taylorfrancis.com/how-to-obtain-institutional-token
  - aid: taylor-francis:taylor-francis-sushi-counter-api
    name: Taylor & Francis SUSHI / COUNTER 5 API
    description: >-
      Taylor & Francis Online supports automated harvesting of COUNTER Release 5
      usage statistics via the SUSHI protocol. Institutional library
      administrators can retrieve Title, Database, Platform, and Item master
      reports through a COUNTER-compliant REST API using credentials generated
      from the T&F librarian portal.
    humanURL: https://www.tandfonline.com/page/librarians/usage
    tags:
      - COUNTER
      - Institutional
      - Library
      - Reporting
      - Statistics
      - SUSHI
      - Usage
    properties:
      - type: Documentation
        url: https://www.tandfonline.com/page/librarians/usage
      - type: Support
        url: https://help.tandfonline.com/s/article/Usage-reports
      - type: ProviderRegistry
        url: https://registry.countermetrics.org/platform/b0d81a4b-9023-42ac-a034-703c23124cae
  - aid: taylor-francis:taylor-francis-text-data-mining-api
    name: Taylor & Francis Text and Data Mining API
    description: >-
      Taylor & Francis provides API-based text and data mining access to
      subscribed and open-access content for non-commercial research purposes.
      Institutions notify Taylor & Francis in advance of TDM projects and
      receive technical assistance to access full-text content programmatically
      across journals and books indexed on tandfonline.com and taylorfrancis.com.
    humanURL: https://taylorandfrancis.com/our-policies/textanddatamining/
    tags:
      - Academic
      - Content
      - Full Text
      - Journals
      - Research
      - Text Mining
    properties:
      - type: Documentation
        url: https://taylorandfrancis.com/our-policies/textanddatamining/
      - type: Support
        url: https://www.tandfonline.com/page/librarians/usage
