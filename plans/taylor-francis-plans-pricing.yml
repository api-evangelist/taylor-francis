specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Taylor & Francis
providerId: taylor-francis
created: '2026-06-13'
modified: '2026-06-13'
tags:
  - Academic
  - Books
  - Journals
  - Metadata
  - Publishing
  - Research
  - Text Mining
description: >-
  Machine-readable plans and pricing scaffold for the Taylor & Francis API
  surface. Taylor & Francis API access is primarily gated by institutional
  subscription agreements. KBART and SUSHI APIs are available to subscribing
  institutions at no additional charge; content and TDM access requires an
  existing subscription or a negotiated licence. Prices and quota limits below
  are scaffold defaults to be reconciled with Taylor & Francis's published
  terms.
plans:
  - id: taylor-francis-institutional
    name: Institutional Subscriber
    type: freemium
    description: >-
      API access bundled with an institutional subscription to Taylor & Francis
      Online journals or eBooks. Includes KBART holdings automation, COUNTER 5
      SUSHI usage harvesting, and content download access for entitled titles.
      No additional charge beyond the subscription fee.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 10000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the institutional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 60
        timeFrame: minute
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: KBART Holdings Automation API
      - name: SUSHI COUNTER 5 API
      - name: Content Download API (subscribed titles)
      - name: Librarian Dashboard Access
      - name: Email Support
  - id: taylor-francis-tdm
    name: Text and Data Mining
    type: paid
    description: >-
      Non-commercial TDM access for institutional researchers. Institutions must
      notify Taylor & Francis in writing before starting a TDM project. Access
      covers subscribed and open-access content. Commercial TDM requires a
      separate negotiated licence.
    entries:
      - label: API Requests
        description: Monthly API request quota for TDM workloads
        name: api_requests
        type: quota
        metric: requests
        limit: 50000
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute for TDM access
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 30
        timeFrame: minute
        geo: global
        domains: []
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Full-Text Content API
      - name: Journals TDM Access
      - name: eBooks TDM Access
      - name: Open Access Content
      - name: Technical Assistance
      - name: Email Support
  - id: taylor-francis-enterprise
    name: Enterprise / Commercial
    type: enterprise
    description: >-
      Custom-negotiated commercial API access for organisations requiring
      high-volume, commercial, or redistributive use of Taylor & Francis content.
      Includes dedicated account management, contractual SLAs, and bespoke
      data licensing.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 500
        timeFrame: minute
        geo: configurable
        domains: []
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Dedicated Account Manager
      - name: Contractual SLA
      - name: Commercial Redistribution Rights
      - name: Custom Data Licensing
      - name: 24/7 Priority Support
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
